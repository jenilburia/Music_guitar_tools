<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle of Fifths — Guitar Tool</title>

  <!-- Space Mono — retro technical font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <h1>Circle of Fifths</h1>
      <span class="header-key" id="header-key">select a key</span>
      <div class="header-controls">
        <button class="btn--icon" id="btn-lefty" title="Switch between left-handed and right-handed chord diagrams">L</button>
        <button class="btn--icon" id="btn-theme" title="Toggle dark / light mode">◑</button>
      </div>
    </div>
  </header>

  <main class="layout">

    <!-- Left column: Circle of Fifths SVG -->
    <section class="panel panel--circle" aria-label="Circle of Fifths">
      <svg id="circle-svg"
           viewBox="-200 -200 400 400"
           width="460" height="460"
           aria-label="Interactive Circle of Fifths — click a segment to select a key"></svg>
    </section>

    <!-- Right column: stacked panels (Progression first on desktop) -->
    <div class="panel-stack">

      <!-- Progression builder + Generator (TOP on desktop, just after circle on mobile) -->
      <section class="panel panel--progression">
        <div class="progression-header">
          <h2 class="panel-title">Progression Builder</h2>
          <div class="progression-actions">
            <button class="btn btn--primary" id="btn-generate" title="Auto-generate a chord progression for the selected key">Generate</button>
            <button class="btn btn--tonal" id="btn-shuffle" title="Shuffle — try a different progression">Shuffle</button>
            <button class="btn btn--ghost" id="btn-copy" title="Copy chord names to clipboard">Copy</button>
            <button class="btn btn--danger" id="btn-clear">Clear</button>
          </div>
        </div>
        <div class="progression-slots" id="progression-slots" aria-live="polite"></div>
        <p class="progression-hint" id="progression-hint">Click a chord above, or hit Generate to auto-build a progression.</p>
        <div class="explanation-panel" id="explanation-panel" style="display:none" aria-live="polite"></div>
      </section>

      <!-- Diatonic chord grid -->
      <section class="panel panel--chords" aria-live="polite">
        <h2 class="panel-title">Diatonic Chords <span id="key-label"></span></h2>
        <div class="chord-grid" id="chord-grid">
          <p class="placeholder">Click a key on the circle to see its chords.</p>
        </div>
      </section>

      <!-- Mode explorer -->
      <section class="panel panel--modes" aria-live="polite">
        <h2 class="panel-title">Mode Explorer <span style="font-size:10px;font-weight:400;letter-spacing:0.5px;color:var(--muted-foreground)">— click a row to generate</span></h2>
        <div class="mode-list" id="mode-list">
          <p class="placeholder">Select a key to explore its modes.</p>
        </div>
      </section>

    </div>
  </main>

  <!-- Chord diagram modal -->
  <div class="modal-overlay" id="modal-overlay" hidden role="presentation">
    <div class="modal" id="modal-chord" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" id="modal-close" aria-label="Close diagram">&#x2715;</button>
      <h3 class="modal-title" id="modal-title"></h3>
      <p class="modal-subtitle" id="modal-subtitle"></p>
      <div class="diagram-container">
        <svg id="diagram-svg" viewBox="0 0 130 170" width="130" height="170" aria-hidden="true"></svg>
      </div>
      <p class="diagram-lefty-note" id="diagram-hand-note">Left-handed · low E on right</p>
    </div>
  </div>

  <!-- Shared state: declared before modules -->
  <script>
    var AppState = {
      currentKey:      null,
      currentKeyIndex: null,
      currentChords:   [],
      isLefty:         true,   // default left-handed; toggled by btn-lefty
    };
  </script>

  <!-- Modules in dependency order (no ES modules — file:// safe) -->
  <script src="js/theory.js"></script>
  <script src="js/voicings.js"></script>
  <script src="js/circle.js"></script>
  <script src="js/chords.js"></script>
  <script src="js/progression.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
