<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle of Fifths — Guitar Tool</title>
  <style>
/* ============================================================
   Circle of Fifths — Guitar Tool
   Dark music-studio aesthetic
   ============================================================ */

/* --- Design Tokens ----------------------------------------- */
:root {
  --bg-base:      #09090f;
  --bg-surface:   #101018;
  --bg-elevated:  #181826;
  --bg-hover:     #1f1f30;

  --text-primary:   #f0f0f8;
  --text-secondary: #8888aa;
  --text-muted:     #4a4a66;

  --color-maj:  #f59e0b;
  --color-min:  #6b7280;
  --color-dim:  #ef4444;

  --circle-selected:  #7c3aed;
  --circle-fifth:     #0891b2;
  --circle-fourth:    #0e7490;
  --circle-rel-minor: #6d28d9;
  --circle-default:   #1a1a28;
  --circle-minor-default: #111120;

  --accent:       #7c3aed;
  --accent-hover: #6d28d9;
  --danger:       #dc2626;

  --radius-sm:  6px;
  --radius-md:  12px;
  --radius-lg:  18px;

  --shadow-panel: 0 4px 24px rgba(0,0,0,0.5);
  --glow-violet:  0 0 24px rgba(124,58,237,0.35);

  --font-ui: 'Inter', 'Segoe UI', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-ui);
  min-height: 100vh;
  line-height: 1.5;
}

.site-header {
  background: var(--bg-surface);
  border-bottom: 1px solid #1e1e30;
  padding: 14px 24px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-inner {
  max-width: 1300px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 16px;
}
.site-header h1 {
  font-size: 1.2rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--text-primary);
}
.header-key {
  font-size: 0.9rem;
  color: var(--color-maj);
  font-weight: 600;
  letter-spacing: 0.03em;
}

.layout {
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 20px;
  padding: 24px;
  max-width: 1300px;
  margin: 0 auto;
  align-items: start;
}

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .panel--circle { display: flex; justify-content: center; }
}

.panel {
  background: var(--bg-surface);
  border: 1px solid #1e1e30;
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-panel);
}

.panel-stack {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.panel-title {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 14px;
}
.panel-title span {
  color: var(--color-maj);
  text-transform: none;
  letter-spacing: 0;
  font-size: 0.85rem;
}

.placeholder {
  color: var(--text-muted);
  font-size: 0.85rem;
  font-style: italic;
}

.panel--circle {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
}

.arc-major {
  fill: var(--circle-default);
  stroke: #242438;
  stroke-width: 1.5;
  cursor: pointer;
  transition: fill 0.15s ease, filter 0.15s ease;
}
.arc-major:hover { fill: var(--bg-hover); }
.arc-major.selected {
  fill: var(--circle-selected);
  filter: drop-shadow(0 0 10px rgba(124,58,237,0.7));
}
.arc-major.neighbor-fifth  { fill: #0c3d4d; }
.arc-major.neighbor-fourth { fill: #0a3040; }

.arc-minor {
  fill: var(--circle-minor-default);
  stroke: #1a1a2a;
  stroke-width: 1;
  cursor: pointer;
  transition: fill 0.15s ease;
}
.arc-minor:hover { fill: #181828; }
.arc-minor.selected { fill: var(--circle-rel-minor); }
.arc-minor.neighbor-fifth  { fill: #0a2a35; }
.arc-minor.neighbor-fourth { fill: #08222c; }

.arc-label-major {
  fill: var(--text-primary);
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font-ui);
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
  user-select: none;
}
.arc-label-minor {
  fill: var(--text-secondary);
  font-size: 8px;
  font-weight: 500;
  font-family: var(--font-ui);
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
  user-select: none;
}
.arc-label-major.selected { fill: #ffffff; }
.arc-label-minor.selected { fill: #e0d4ff; }

.circle-center {
  fill: #0d0d18;
  stroke: #242438;
  stroke-width: 1.5;
}
.circle-center-text {
  fill: var(--text-muted);
  font-size: 8px;
  font-family: var(--font-ui);
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
  user-select: none;
}

.chord-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}
@media (max-width: 700px) {
  .chord-grid { grid-template-columns: repeat(4, 1fr); }
}

.chord-card {
  background: var(--bg-elevated);
  border: 2px solid transparent;
  border-radius: var(--radius-md);
  padding: 10px 6px;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
  position: relative;
}
.chord-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(124,58,237,0.2);
}
.chord-card.active { border-color: var(--color-maj); background: #1e1a0a; }

.chord-roman {
  display: block;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}
.chord-card--maj .chord-roman { color: var(--color-maj); }
.chord-card--min .chord-roman { color: var(--color-min); }
.chord-card--dim .chord-roman { color: var(--color-dim); }

.chord-name {
  display: block;
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 3px;
}

.chord-mode-name {
  display: block;
  font-size: 0.6rem;
  color: var(--text-muted);
  line-height: 1.2;
}

.btn-diagram {
  display: block;
  width: 100%;
  margin-top: 6px;
  padding: 3px 0;
  background: #242438;
  border: 1px solid #333355;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 0.58rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
}
.btn-diagram:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.mode-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.mode-row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 10px 12px;
  background: var(--bg-elevated);
  border-radius: var(--radius-md);
  border-left: 3px solid var(--mode-color, #333);
}

.mode-meta { flex-shrink: 0; min-width: 72px; }
.mode-chord-name { font-weight: 700; font-size: 0.95rem; display: block; line-height: 1.2; }
.mode-roman { font-size: 0.65rem; color: var(--text-muted); display: block; }
.mode-info { flex: 1; }
.mode-name { font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); display: block; margin-bottom: 2px; }
.mode-desc { font-size: 0.72rem; color: var(--text-muted); line-height: 1.4; }

.progression-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.progression-header .panel-title { margin-bottom: 0; }
.progression-actions { display: flex; gap: 8px; }

.btn {
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.1s, opacity 0.1s;
}
.btn--ghost { background: transparent; border-color: #333355; color: var(--text-secondary); }
.btn--ghost:hover { border-color: var(--accent); color: var(--text-primary); }
.btn--danger { background: transparent; border-color: #4a1a1a; color: var(--danger); }
.btn--danger:hover { background: var(--danger); color: #fff; }

.progression-slots {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  min-height: 62px;
  align-items: flex-start;
}

.prog-slot {
  width: 68px;
  min-height: 58px;
  border-radius: var(--radius-md);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  position: relative;
  font-size: 0.8rem;
}
.prog-slot--empty { border: 2px dashed #2a2a3f; background: transparent; }
.prog-slot--filled { background: var(--bg-elevated); border: 2px solid #333355; cursor: pointer; }
.prog-slot--filled:hover { border-color: var(--danger); }
.prog-slot--filled:hover .prog-remove { opacity: 1; }
.prog-slot--maj { border-color: #3a2a00 !important; }
.prog-slot--maj:hover { border-color: var(--danger) !important; }
.prog-slot--min { border-color: #2a2a3a !important; }
.prog-slot--min:hover { border-color: var(--danger) !important; }
.prog-slot--dim { border-color: #2a1010 !important; }
.prog-slot--dim:hover { border-color: var(--danger) !important; }

.prog-roman { font-size: 0.6rem; color: var(--text-muted); font-weight: 600; }
.prog-name { font-weight: 700; font-size: 0.9rem; }
.prog-slot--maj .prog-name { color: var(--color-maj); }
.prog-slot--min .prog-name { color: var(--text-secondary); }
.prog-slot--dim .prog-name { color: var(--color-dim); }

.prog-remove {
  position: absolute;
  top: -7px; right: -7px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--danger);
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 11px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.15s;
}

.progression-hint { font-size: 0.72rem; color: var(--text-muted); font-style: italic; margin-top: 10px; }

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  z-index: 100;
}
.modal-overlay[hidden] { display: none; }

.modal {
  background: var(--bg-surface);
  border: 1px solid #2a2a40;
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  min-width: 220px;
  text-align: center;
  position: relative;
  box-shadow: var(--glow-violet), var(--shadow-panel);
  animation: modal-in 0.18s ease;
}
@keyframes modal-in {
  from { opacity: 0; transform: scale(0.92) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-close {
  position: absolute;
  top: 12px; right: 14px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 1.4rem;
  cursor: pointer;
  line-height: 1;
  transition: color 0.1s;
}
.modal-close:hover { color: var(--text-primary); }
.modal-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 4px; }
.modal-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 20px; }
.diagram-container { display: flex; justify-content: center; margin: 0 auto 10px; }
.diagram-lefty-note { font-size: 0.65rem; color: var(--text-muted); font-style: italic; margin-top: 8px; }

.fret-line        { stroke: #2a2a44; stroke-width: 1; }
.fret-line--nut   { stroke: #888; stroke-width: 3; }
.string-line      { stroke: #3a3a55; stroke-width: 1; }
.fret-dot         { fill: var(--accent); }
.dot-open         { fill: none; stroke: #888; stroke-width: 1.5; }
.dot-mute-line    { stroke: #666; stroke-width: 1.5; stroke-linecap: round; }
.barre-bar        { stroke: var(--accent); stroke-width: 10; stroke-linecap: round; opacity: 0.75; }
.fret-number      { fill: var(--text-muted); font-size: 9px; font-family: var(--font-ui); }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <h1>Circle of Fifths</h1>
      <span class="header-key" id="header-key">— select a key —</span>
    </div>
  </header>

  <main class="layout">
    <section class="panel panel--circle">
      <svg id="circle-svg" viewBox="-200 -200 400 400" width="400" height="400" aria-label="Circle of Fifths"></svg>
    </section>

    <div class="panel-stack">
      <section class="panel panel--chords">
        <h2 class="panel-title">Diatonic Chords <span id="key-label"></span></h2>
        <div class="chord-grid" id="chord-grid">
          <p class="placeholder">Click a key on the circle to see its chords.</p>
        </div>
      </section>

      <section class="panel panel--modes">
        <h2 class="panel-title">Mode Explorer</h2>
        <div class="mode-list" id="mode-list">
          <p class="placeholder">Select a key to explore its modes.</p>
        </div>
      </section>

      <section class="panel panel--progression">
        <div class="progression-header">
          <h2 class="panel-title">Progression Builder</h2>
          <div class="progression-actions">
            <button class="btn btn--ghost" id="btn-copy">Copy</button>
            <button class="btn btn--danger" id="btn-clear">Clear</button>
          </div>
        </div>
        <div class="progression-slots" id="progression-slots"></div>
        <p class="progression-hint" id="progression-hint">Click any chord above to add it here.</p>
      </section>
    </div>
  </main>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal-chord" role="dialog" aria-modal="true">
      <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      <h3 class="modal-title" id="modal-title"></h3>
      <p class="modal-subtitle" id="modal-subtitle"></p>
      <div class="diagram-container">
        <svg id="diagram-svg" viewBox="0 0 130 170" width="130" height="170"></svg>
      </div>
      <p class="diagram-lefty-note">Left-handed diagram (low E on right)</p>
    </div>
  </div>

  <script>
    var AppState = { currentKey: null, currentKeyIndex: null, currentChords: [] };
  </script>

  <script>
/* theory.js */
var CIRCLE = ['C','G','D','A','E','B','F#','Db','Ab','Eb','Bb','F'];
var REL_MINORS = ['Am','Em','Bm','F#m','C#m','G#m','D#m','Bbm','Fm','Cm','Gm','Dm'];
var CHROMATIC      = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
var FLAT_CHROMATIC = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
var FLAT_KEYS = ['F','Bb','Eb','Ab','Db','Gb'];
var MAJOR_INTERVALS = [0, 2, 4, 5, 7, 9, 11];
var QUALITIES = ['maj','min','min','maj','maj','min','dim'];
var ROMANS = ['I','ii','iii','IV','V','vi','vii°'];
var MODE_NAMES = ['Ionian','Dorian','Phrygian','Lydian','Mixolydian','Aeolian','Locrian'];
var MODE_COLORS = ['#f59e0b','#3b82f6','#ef4444','#a78bfa','#f97316','#6b7280','#1f2937'];
var MODE_FEEL = {
  'Ionian':     'Bright, happy, resolved. The home base of Western music. Every major key song lives here.',
  'Dorian':     'Minor with a raised 6th. Soulful, funky, sophisticated. Santana, Miles Davis. Use over ii chord.',
  'Phrygian':   'Minor with a \u266d2nd. Dark, exotic, Spanish/metal. Heavy and mysterious. Djent and flamenco territory.',
  'Lydian':     'Major with a \u266f4th. Dreamy, floating, ethereal. Joe Satriani lives here. Perfect for ambient passages.',
  'Mixolydian': "Major with a \u266d7th. Bluesy rock, dominant energy. Classic rock's home. Stairway to Heaven verse.",
  'Aeolian':    'Natural minor. Sad, emotional, introspective. Most expressive for dark moods. Most rock ballads.',
  'Locrian':    'Diminished root. Unstable, dissonant, barely resolved. Use sparingly for maximum tension and drama.'
};
function normalizeKey(key) {
  var m = {'Db':'C#','Eb':'D#','Fb':'E','Gb':'F#','Ab':'G#','Bb':'A#','Cb':'B'};
  return m[key] !== undefined ? m[key] : key;
}
function noteNameForKey(idx, keyRoot) {
  return FLAT_KEYS.indexOf(keyRoot) !== -1 ? FLAT_CHROMATIC[idx] : CHROMATIC[idx];
}
function getDiatonicChords(key) {
  var norm = normalizeKey(key);
  var rootIdx = CHROMATIC.indexOf(norm);
  if (rootIdx === -1) return [];
  return MAJOR_INTERVALS.map(function(interval, degree) {
    var noteIdx  = (rootIdx + interval) % 12;
    var rootNote = noteNameForKey(noteIdx, key);
    var quality  = QUALITIES[degree];
    var chordName = quality === 'min' ? rootNote + 'm' : quality === 'dim' ? rootNote + '\u00b0' : rootNote;
    var voicingKey = quality === 'dim' ? rootNote + 'dim' : chordName;
    return { degree: degree+1, roman: ROMANS[degree], chordName: chordName, rootNote: rootNote,
             quality: quality, modeIndex: degree, modeName: MODE_NAMES[degree],
             modeDescription: MODE_FEEL[MODE_NAMES[degree]], modeColor: MODE_COLORS[degree], voicingKey: voicingKey };
  });
}
function getNeighborIndices(i) { return { fifth: (i+1)%12, fourth: (i+11)%12 }; }
  </script>

  <script>
/* voicings.js */
var VOICINGS = {
  'C':  { frets: [-1,3,2,0,1,0], baseFret: 1 },
  'G':  { frets: [3,2,0,0,0,3],  baseFret: 1 },
  'D':  { frets: [-1,-1,0,2,3,2],baseFret: 1 },
  'A':  { frets: [-1,0,2,2,2,0], baseFret: 1 },
  'E':  { frets: [0,2,2,1,0,0],  baseFret: 1 },
  'F':  { frets: [1,3,3,2,1,1],  baseFret: 1 },
  'B':  { frets: [-1,2,4,4,4,2], baseFret: 2 },
  'F#': { frets: [2,4,4,3,2,2],  baseFret: 2 },
  'Gb': { frets: [2,4,4,3,2,2],  baseFret: 2 },
  'Db': { frets: [-1,4,6,6,6,4], baseFret: 4 },
  'Ab': { frets: [4,6,6,5,4,4],  baseFret: 4 },
  'Eb': { frets: [-1,6,8,8,8,6], baseFret: 6 },
  'Bb': { frets: [-1,1,3,3,3,1], baseFret: 1 },
  'Am': { frets: [-1,0,2,2,1,0], baseFret: 1 },
  'Em': { frets: [0,2,2,0,0,0],  baseFret: 1 },
  'Dm': { frets: [-1,-1,0,2,3,1],baseFret: 1 },
  'Fm': { frets: [1,3,3,1,1,1],  baseFret: 1 },
  'Bm': { frets: [-1,2,4,4,3,2], baseFret: 2 },
  'F#m':{ frets: [2,4,4,2,2,2],  baseFret: 2 },
  'Gbm':{ frets: [2,4,4,2,2,2],  baseFret: 2 },
  'C#m':{ frets: [-1,4,6,6,5,4], baseFret: 4 },
  'Dbm':{ frets: [-1,4,6,6,5,4], baseFret: 4 },
  'G#m':{ frets: [4,6,6,4,4,4],  baseFret: 4 },
  'Abm':{ frets: [4,6,6,4,4,4],  baseFret: 4 },
  'D#m':{ frets: [-1,6,8,8,7,6], baseFret: 6 },
  'Ebm':{ frets: [-1,6,8,8,7,6], baseFret: 6 },
  'Bbm':{ frets: [-1,1,3,3,2,1], baseFret: 1 },
  'Cm': { frets: [-1,3,5,5,4,3], baseFret: 3 },
  'Gm': { frets: [3,5,5,3,3,3],  baseFret: 3 },
  'Bdim':  { frets: [-1,2,3,4,3,-1], baseFret: 1 },
  'F#dim': { frets: [2,3,4,2,-1,-1], baseFret: 2 },
  'C#dim': { frets: [-1,4,5,3,5,-1], baseFret: 3 },
  'G#dim': { frets: [-1,0,1,2,1,-1], baseFret: 1 },
  'D#dim': { frets: [-1,1,2,3,2,-1], baseFret: 1 },
  'A#dim': { frets: [-1,1,2,0,2,-1], baseFret: 1 },
  'Edim':  { frets: [0,1,2,0,-1,-1], baseFret: 1 },
  'Cdim':  { frets: [-1,3,4,5,4,-1], baseFret: 3 },
  'Gdim':  { frets: [-1,-1,5,6,5,-1],baseFret: 5 },
  'Ddim':  { frets: [-1,-1,0,1,0,-1],baseFret: 1 },
  'Adim':  { frets: [-1,0,1,2,1,-1], baseFret: 1 },
  'Fdim':  { frets: [1,2,3,1,-1,-1], baseFret: 1 },
  'Gbdim': { frets: [2,3,4,2,-1,-1], baseFret: 2 },
  'Dbdim': { frets: [-1,4,5,3,5,-1], baseFret: 3 },
  'Abdim': { frets: [-1,0,1,2,1,-1], baseFret: 1 },
  'Ebdim': { frets: [-1,1,2,3,2,-1], baseFret: 1 },
  'Bbdim': { frets: [-1,1,2,0,2,-1], baseFret: 1 },
};
function getVoicing(key) {
  if (VOICINGS[key]) return VOICINGS[key];
  var c = key.replace('\u00b0','dim');
  if (VOICINGS[c]) return VOICINGS[c];
  return { frets: [-1,-1,-1,-1,-1,-1], baseFret: 1 };
}
function mirrorForLefty(frets) { return frets.slice().reverse(); }
  </script>

  <script>
/* circle.js */
var CIRCLE_OUTER_R=175, CIRCLE_MID_R=118, CIRCLE_INNER_R=66, CIRCLE_LABEL_MAJ=147, CIRCLE_LABEL_MIN=92;
function deg2rad(d){return d*Math.PI/180;}
function polarToXY(r,a){var rad=deg2rad(a);return{x:r*Math.cos(rad),y:r*Math.sin(rad)};}
function createArcPath(innerR,outerR,s,e){
  var p1=polarToXY(outerR,s),p2=polarToXY(outerR,e),p3=polarToXY(innerR,e),p4=polarToXY(innerR,s);
  var d=['M',p1.x,p1.y,'A',outerR,outerR,0,0,1,p2.x,p2.y,'L',p3.x,p3.y,'A',innerR,innerR,0,0,0,p4.x,p4.y,'Z'].join(' ');
  var path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',d);return path;
}
function createArcLabel(r,a,text,cls){
  var pos=polarToXY(r,a);
  var el=document.createElementNS('http://www.w3.org/2000/svg','text');
  el.setAttribute('x',pos.x);el.setAttribute('y',pos.y);el.setAttribute('class',cls);el.textContent=text;return el;
}
function initCircle(svgEl){
  while(svgEl.firstChild)svgEl.removeChild(svgEl.firstChild);
  var hub=document.createElementNS('http://www.w3.org/2000/svg','circle');
  hub.setAttribute('r',CIRCLE_INNER_R);hub.setAttribute('cx',0);hub.setAttribute('cy',0);hub.setAttribute('class','circle-center');
  svgEl.appendChild(hub);
  var ht=document.createElementNS('http://www.w3.org/2000/svg','text');
  ht.setAttribute('x',0);ht.setAttribute('y',0);ht.setAttribute('class','circle-center-text');ht.textContent='5ths';svgEl.appendChild(ht);
  for(var i=0;i<12;i++){
    var mid=i*30-90,start=mid-15,end=mid+15;
    var ma=createArcPath(CIRCLE_MID_R,CIRCLE_OUTER_R,start,end);
    ma.setAttribute('class','arc-major');ma.dataset.index=i;ma.dataset.key=CIRCLE[i];ma.dataset.ringType='major';svgEl.appendChild(ma);
    var ml=createArcLabel(CIRCLE_LABEL_MAJ,mid,CIRCLE[i],'arc-label-major');
    ml.dataset.index=i;ml.dataset.ringType='major';svgEl.appendChild(ml);
    var na=createArcPath(CIRCLE_INNER_R,CIRCLE_MID_R,start,end);
    na.setAttribute('class','arc-minor');na.dataset.index=i;na.dataset.key=REL_MINORS[i];na.dataset.ringType='minor';svgEl.appendChild(na);
    var nl=createArcLabel(CIRCLE_LABEL_MIN,mid,REL_MINORS[i],'arc-label-minor');
    nl.dataset.index=i;nl.dataset.ringType='minor';svgEl.appendChild(nl);
  }
  svgEl.addEventListener('click',function(e){
    var t=e.target,idx=t.dataset&&t.dataset.index;
    if(idx===undefined||idx===null||idx==='')return;
    selectKey(svgEl,parseInt(idx,10));
  });
}
function selectKey(svgEl,circleIndex){
  var nb=getNeighborIndices(circleIndex);
  svgEl.querySelectorAll('.arc-major,.arc-label-major').forEach(function(el){el.classList.remove('selected','neighbor-fifth','neighbor-fourth');});
  svgEl.querySelectorAll('.arc-minor,.arc-label-minor').forEach(function(el){el.classList.remove('selected','neighbor-fifth','neighbor-fourth');});
  svgEl.querySelectorAll('[data-index="'+circleIndex+'"]').forEach(function(el){el.classList.add('selected');});
  svgEl.querySelectorAll('[data-index="'+nb.fifth+'"].arc-major,[data-index="'+nb.fifth+'"].arc-label-major').forEach(function(el){el.classList.add('neighbor-fifth');});
  svgEl.querySelectorAll('[data-index="'+nb.fourth+'"].arc-major,[data-index="'+nb.fourth+'"].arc-label-major').forEach(function(el){el.classList.add('neighbor-fourth');});
  svgEl.dispatchEvent(new CustomEvent('keySelected',{detail:{circleIndex:circleIndex,key:CIRCLE[circleIndex]},bubbles:true}));
}
  </script>

  <script>
/* chords.js */
function renderChordGrid(chords,keyName){
  var grid=document.getElementById('chord-grid');
  document.getElementById('key-label').textContent='\u2014 '+keyName+' Major';
  grid.innerHTML='';
  chords.forEach(function(chord,idx){
    var card=document.createElement('div');
    card.className='chord-card chord-card--'+chord.quality;
    card.dataset.chordIndex=idx;
    card.title=chord.modeName+': '+chord.modeDescription;
    card.innerHTML='<span class="chord-roman">'+chord.roman+'</span>'+
      '<span class="chord-name">'+chord.chordName+'</span>'+
      '<span class="chord-mode-name">'+chord.modeName+'</span>'+
      '<button class="btn-diagram" data-voicing-key="'+chord.voicingKey+'" data-chord-name="'+chord.chordName+'" data-mode-name="'+chord.modeName+'" data-quality="'+chord.quality+'">Diagram</button>';
    grid.appendChild(card);
  });
}
function renderModeList(chords){
  var list=document.getElementById('mode-list');
  list.innerHTML='';
  chords.forEach(function(chord){
    var row=document.createElement('div');
    row.className='mode-row';
    row.style.setProperty('--mode-color',chord.modeColor);
    row.innerHTML='<div class="mode-meta"><span class="mode-chord-name">'+chord.chordName+'</span><span class="mode-roman">'+chord.roman+'</span></div>'+
      '<div class="mode-info"><span class="mode-name">'+chord.modeName+'</span><p class="mode-desc">'+chord.modeDescription+'</p></div>';
    list.appendChild(row);
  });
}
  </script>

  <script>
/* progression.js */
var MAX_SLOTS=8,_progression=[];
function addToProgression(chord){if(_progression.length>=MAX_SLOTS)return;_progression.push(chord);renderProgression();updateProgressionHint();}
function removeFromProgression(i){_progression.splice(i,1);renderProgression();updateProgressionHint();}
function clearProgression(){_progression=[];renderProgression();updateProgressionHint();}
function getProgressionString(){return _progression.map(function(c){return c.chordName;}).join(' - ');}
function renderProgression(){
  var c=document.getElementById('progression-slots');c.innerHTML='';
  for(var i=0;i<MAX_SLOTS;i++){
    var slot=document.createElement('div');
    if(_progression[i]){
      var ch=_progression[i];
      slot.className='prog-slot prog-slot--filled prog-slot--'+ch.quality;
      slot.dataset.slotIndex=i;
      var rb=document.createElement('button');rb.className='prog-remove';rb.dataset.index=i;rb.title='Remove';rb.innerHTML='&times;';
      var re=document.createElement('span');re.className='prog-roman';re.textContent=ch.roman;
      var ne=document.createElement('span');ne.className='prog-name';ne.textContent=ch.chordName;
      slot.appendChild(rb);slot.appendChild(re);slot.appendChild(ne);
    }else{slot.className='prog-slot prog-slot--empty';}
    c.appendChild(slot);
  }
  c.querySelectorAll('.prog-remove').forEach(function(btn){
    btn.addEventListener('click',function(e){e.stopPropagation();removeFromProgression(parseInt(btn.dataset.index,10));});
  });
}
function updateProgressionHint(){var h=document.getElementById('progression-hint');if(h)h.style.display=_progression.length===0?'block':'none';}
  </script>

  <script>
/* app.js */
document.addEventListener('DOMContentLoaded',function(){
  var svg=document.getElementById('circle-svg');
  initCircle(svg);renderProgression();updateProgressionHint();

  svg.addEventListener('keySelected',function(e){
    var key=e.detail.key;
    AppState.currentKey=key;AppState.currentKeyIndex=e.detail.circleIndex;
    AppState.currentChords=getDiatonicChords(key);
    document.getElementById('header-key').textContent=key+' Major';
    renderChordGrid(AppState.currentChords,key);
    renderModeList(AppState.currentChords);
  });

  document.getElementById('chord-grid').addEventListener('click',function(e){
    if(e.target.matches('.btn-diagram')||e.target.closest('.btn-diagram'))return;
    var card=e.target.closest('.chord-card');if(!card)return;
    var chord=AppState.currentChords[parseInt(card.dataset.chordIndex,10)];if(!chord)return;
    addToProgression(chord);
    card.classList.add('active');setTimeout(function(){card.classList.remove('active');},300);
  });

  document.getElementById('chord-grid').addEventListener('click',function(e){
    var btn=e.target.closest('.btn-diagram');if(!btn)return;e.stopPropagation();
    openDiagramModal(btn.dataset.voicingKey,btn.dataset.chordName,btn.dataset.modeName);
  });

  document.getElementById('btn-clear').addEventListener('click',clearProgression);

  document.getElementById('btn-copy').addEventListener('click',function(){
    var str=getProgressionString();if(!str)return;
    if(navigator.clipboard){navigator.clipboard.writeText(str).then(function(){flashBtn(document.getElementById('btn-copy'),'Copied!');});}
    else{var ta=document.createElement('textarea');ta.value=str;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);flashBtn(document.getElementById('btn-copy'),'Copied!');}
  });

  document.getElementById('modal-close').addEventListener('click',closeDiagramModal);
  document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===e.currentTarget)closeDiagramModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDiagramModal();});
});

function openDiagramModal(vk,cn,mn){
  document.getElementById('modal-title').textContent=cn;
  document.getElementById('modal-subtitle').textContent=mn+' mode';
  renderChordDiagram(vk,document.getElementById('diagram-svg'));
  document.getElementById('modal-overlay').removeAttribute('hidden');
}
function closeDiagramModal(){document.getElementById('modal-overlay').setAttribute('hidden','');}
function flashBtn(btn,text){var o=btn.textContent;btn.textContent=text;setTimeout(function(){btn.textContent=o;},1500);}

var D_START_X=22,D_START_Y=36,D_STR_GAP=17,D_FRET_GAP=22,D_NUM_FRETS=4,D_DOT_R=7,D_OPEN_R=6;
function renderChordDiagram(vk,svgEl){
  while(svgEl.firstChild)svgEl.removeChild(svgEl.firstChild);
  var voicing=getVoicing(vk),frets=mirrorForLefty(voicing.frets),baseFret=voicing.baseFret,n=6;
  function el(tag,attrs){var e=document.createElementNS('http://www.w3.org/2000/svg',tag);Object.keys(attrs).forEach(function(k){e.setAttribute(k,attrs[k]);});return e;}
  for(var f=0;f<=D_NUM_FRETS;f++){var y=D_START_Y+f*D_FRET_GAP,x1=D_START_X,x2=D_START_X+(n-1)*D_STR_GAP;svgEl.appendChild(el('line',{x1:x1,y1:y,x2:x2,y2:y,'class':(f===0&&baseFret===1)?'fret-line fret-line--nut':'fret-line'}));}
  for(var s=0;s<n;s++){var x=D_START_X+s*D_STR_GAP;svgEl.appendChild(el('line',{x1:x,y1:D_START_Y,x2:x,y2:D_START_Y+D_NUM_FRETS*D_FRET_GAP,'class':'string-line'}));}
  if(baseFret>1){var fl=el('text',{x:D_START_X-5,y:D_START_Y+D_FRET_GAP*0.5+4,'class':'fret-number','text-anchor':'end'});fl.textContent=baseFret+'fr';svgEl.appendChild(fl);}
  for(var s2=0;s2<n;s2++){var sx=D_START_X+s2*D_STR_GAP,my=D_START_Y-14,half=5;
    if(frets[s2]===-1){svgEl.appendChild(el('line',{x1:sx-half,y1:my-half,x2:sx+half,y2:my+half,'class':'dot-mute-line'}));svgEl.appendChild(el('line',{x1:sx+half,y1:my-half,x2:sx-half,y2:my+half,'class':'dot-mute-line'}));}
    else if(frets[s2]===0){svgEl.appendChild(el('circle',{cx:sx,cy:my,r:D_OPEN_R,'class':'dot-open'}));}
  }
  var played=frets.filter(function(f){return f>0;}),minF=played.length?Math.min.apply(null,played):0;
  var barreS=[];frets.forEach(function(f,i){if(f===minF&&minF>0)barreS.push(i);});
  if(barreS.length>=3){var rf=minF-(baseFret-1),by=D_START_Y+(rf-0.5)*D_FRET_GAP;svgEl.appendChild(el('line',{x1:D_START_X+barreS[0]*D_STR_GAP,y1:by,x2:D_START_X+barreS[barreS.length-1]*D_STR_GAP,y2:by,'class':'barre-bar'}));}
  for(var s3=0;s3<n;s3++){var fn=frets[s3];if(fn<=0)continue;var rfn=fn-(baseFret-1);if(rfn<1||rfn>D_NUM_FRETS)continue;var isBarre=barreS.length>=3&&fn===minF;if(!isBarre)svgEl.appendChild(el('circle',{cx:D_START_X+s3*D_STR_GAP,cy:D_START_Y+(rfn-0.5)*D_FRET_GAP,r:D_DOT_R,'class':'fret-dot'}));}
  if(barreS.length>=3){for(var s4=0;s4<n;s4++){var fv=frets[s4];if(fv<=0||fv===minF)continue;var rv=fv-(baseFret-1);if(rv<1||rv>D_NUM_FRETS)continue;svgEl.appendChild(el('circle',{cx:D_START_X+s4*D_STR_GAP,cy:D_START_Y+(rv-0.5)*D_FRET_GAP,r:D_DOT_R,'class':'fret-dot'}));}}
}
  </script>
