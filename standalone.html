<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle of Fifths — Guitar Tool</title>
  <style>
/* ============================================================
   Material Design 3 · Dark Theme · Purple seed
   Standalone — no external dependencies
   ============================================================ */

:root {
  --md-primary:                #D0BCFF;
  --md-on-primary:             #381E72;
  --md-primary-container:      #4F378A;
  --md-on-primary-container:   #EADDFF;
  --md-secondary:              #CCC2DC;
  --md-on-secondary:           #332D41;
  --md-secondary-container:    #4A4458;
  --md-on-secondary-container: #E8DEF8;
  --md-tertiary:               #EFB8C8;
  --md-on-tertiary:            #492532;
  --md-tertiary-container:     #633B48;
  --md-on-tertiary-container:  #FFD8E4;
  --md-error:                  #F2B8B5;
  --md-on-error:               #601410;
  --md-error-container:        #8C1D18;
  --md-on-error-container:     #F9DEDC;
  --md-background:             #141218;
  --md-on-background:          #E6E0E9;
  --md-surface:                #141218;
  --md-on-surface:             #E6E0E9;
  --md-surface-variant:        #49454F;
  --md-on-surface-variant:     #CAC4D0;
  --md-outline:                #938F99;
  --md-outline-variant:        #49454F;
  --md-surf-0: #0F0D13;
  --md-surf-1: #1D1B20;
  --md-surf-2: #211F26;
  --md-surf-3: #2B2930;
  --md-surf-4: #302E37;
  --md-surf-5: #36343B;
  --color-maj: #FFB84D;
  --color-min: #CAC4D0;
  --color-dim: #F2B8B5;
  --circle-selected-fill:  #4F378A;
  --circle-fifth-fill:     #1A3B39;
  --circle-fourth-fill:    #1B2F46;
  --circle-minor-sel-fill: #4A4458;
  --shape-xs:   4px;
  --shape-sm:   8px;
  --shape-md:   12px;
  --shape-lg:   16px;
  --shape-xl:   28px;
  --shape-full: 9999px;
  --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  background: var(--md-background);
  color: var(--md-on-background);
  font-family: var(--font);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.site-header {
  background: var(--md-surf-1);
  height: 64px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  position: sticky;
  top: 0;
  z-index: 20;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.header-inner {
  max-width: 1400px;
  width: 100%;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.site-header h1 { font-size: 22px; font-weight: 400; color: var(--md-on-surface); }
.header-key {
  font-size: 13px;
  font-weight: 500;
  background: var(--md-primary-container);
  color: var(--md-on-primary-container);
  padding: 4px 14px;
  border-radius: var(--shape-full);
  letter-spacing: 0.2px;
}

.layout {
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 16px;
  padding: 16px;
  max-width: 1400px;
  margin: 0 auto;
  align-items: start;
}
@media (max-width: 1120px) {
  .layout { grid-template-columns: 1fr; max-width: 660px; }
}

.panel {
  background: var(--md-surf-1);
  border-radius: var(--shape-xl);
  padding: 20px;
  border: 1px solid rgba(255,255,255,0.06);
}
.panel-stack { display: flex; flex-direction: column; gap: 12px; }
.panel-title {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--md-outline);
  margin-bottom: 16px;
}
.panel-title span {
  color: var(--md-primary);
  text-transform: none;
  letter-spacing: 0.2px;
  font-size: 14px;
  font-weight: 500;
}
.placeholder { color: var(--md-on-surface-variant); font-size: 14px; font-style: italic; }

.panel--circle {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
#circle-svg { max-width: 100%; height: auto; display: block; }

.arc-major {
  fill: var(--md-surf-3);
  stroke: rgba(255,255,255,0.05);
  stroke-width: 1;
  cursor: pointer;
  transition: fill 0.18s ease;
}
.arc-major:hover { fill: var(--md-surf-4); }
.arc-major.selected {
  fill: var(--circle-selected-fill);
  filter: drop-shadow(0 0 10px rgba(208,188,255,0.45));
}
.arc-major.neighbor-fifth  { fill: var(--circle-fifth-fill); }
.arc-major.neighbor-fourth { fill: var(--circle-fourth-fill); }
.arc-minor {
  fill: var(--md-surf-2);
  stroke: rgba(255,255,255,0.03);
  stroke-width: 0.5;
  cursor: pointer;
  transition: fill 0.18s ease;
}
.arc-minor:hover { fill: var(--md-surf-3); }
.arc-minor.selected { fill: var(--circle-minor-sel-fill); }
.arc-minor.neighbor-fifth  { fill: #12292A; }
.arc-minor.neighbor-fourth { fill: #122036; }
.arc-label-major {
  fill: var(--md-on-surface-variant);
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font);
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
  user-select: none;
  transition: fill 0.18s;
}
.arc-label-minor {
  fill: var(--md-outline);
  font-size: 7.5px;
  font-weight: 500;
  font-family: var(--font);
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
  user-select: none;
}
.arc-label-major.selected { fill: var(--md-on-primary-container); font-weight: 700; }
.arc-label-minor.selected { fill: var(--md-on-secondary-container); }
.circle-center { fill: var(--md-surf-0); stroke: rgba(255,255,255,0.06); stroke-width: 1; }
.circle-center-text {
  fill: var(--md-outline);
  font-size: 7px;
  font-family: var(--font);
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
  user-select: none;
}

.chord-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 8px; }
@media (max-width: 660px) { .chord-grid { grid-template-columns: repeat(4,1fr); } }
@media (max-width: 360px) { .chord-grid { grid-template-columns: repeat(3,1fr); } }

.chord-card {
  background: var(--md-surf-2);
  border: 1.5px solid var(--md-outline-variant);
  border-radius: var(--shape-md);
  padding: 10px 6px 8px;
  cursor: pointer;
  text-align: center;
  transition: background 0.15s, border-color 0.15s, transform 0.12s;
  position: relative;
}
.chord-card:hover { background: var(--md-surf-3); border-color: var(--md-primary); transform: translateY(-2px); }
.chord-card.active { background: rgba(79,55,138,0.5); border-color: var(--md-primary); }
.chord-roman { display: block; font-size: 10px; font-weight: 600; letter-spacing: 0.4px; margin-bottom: 4px; }
.chord-card--maj .chord-roman { color: var(--color-maj); }
.chord-card--min .chord-roman { color: var(--md-secondary); }
.chord-card--dim .chord-roman { color: var(--md-error); }
.chord-name { display: block; font-size: 15px; font-weight: 700; color: var(--md-on-surface); line-height: 1.1; margin-bottom: 3px; }
.chord-mode-name { display: block; font-size: 9px; color: var(--md-outline); line-height: 1.2; margin-bottom: 5px; }
.btn-diagram {
  display: block;
  width: 100%;
  padding: 4px 0;
  background: transparent;
  border: 1px solid var(--md-outline-variant);
  border-radius: var(--shape-sm);
  color: var(--md-on-surface-variant);
  font-size: 9px;
  font-family: var(--font);
  font-weight: 500;
  letter-spacing: 0.4px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.btn-diagram:hover { background: var(--md-primary-container); color: var(--md-on-primary-container); border-color: var(--md-primary); }

.mode-list { display: flex; flex-direction: column; gap: 6px; }
.mode-row {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  padding: 12px 14px;
  background: var(--md-surf-2);
  border-radius: var(--shape-lg);
  border-left: 3px solid var(--mode-color, var(--md-outline-variant));
  transition: background 0.15s;
}
.mode-row:hover { background: var(--md-surf-3); }
.mode-meta { flex-shrink: 0; min-width: 60px; }
.mode-chord-name { font-weight: 700; font-size: 15px; color: var(--md-on-surface); display: block; line-height: 1.2; }
.mode-roman { font-size: 10px; color: var(--md-outline); font-weight: 500; display: block; }
.mode-info { flex: 1; min-width: 0; }
.mode-name { font-size: 12px; font-weight: 600; color: var(--md-on-surface-variant); display: block; margin-bottom: 2px; }
.mode-desc { font-size: 12px; color: var(--md-outline); line-height: 1.55; }

.progression-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 8px; }
.progression-header .panel-title { margin-bottom: 0; }
.progression-actions { display: flex; gap: 8px; }
.btn {
  height: 36px;
  padding: 0 16px;
  border-radius: var(--shape-full);
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  border: none;
  letter-spacing: 0.1px;
  white-space: nowrap;
  transition: background 0.15s;
  display: inline-flex;
  align-items: center;
}
.btn--ghost { background: transparent; border: 1px solid var(--md-outline); color: var(--md-primary); }
.btn--ghost:hover { background: rgba(208,188,255,0.08); border-color: var(--md-primary); }
.btn--danger { background: var(--md-error-container); color: var(--md-on-error-container); }
.btn--danger:hover { background: #A32727; color: #fff; }

.progression-slots { display: flex; gap: 8px; flex-wrap: wrap; min-height: 52px; align-items: center; }
.prog-slot {
  min-width: 52px;
  height: 52px;
  border-radius: var(--shape-md);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  position: relative;
}
.prog-slot--empty { width: 52px; border: 2px dashed rgba(255,255,255,0.08); }
.prog-slot--filled {
  padding: 0 12px;
  background: var(--md-surf-3);
  border: 1.5px solid var(--md-outline-variant);
  cursor: pointer;
  transition: border-color 0.15s;
}
.prog-slot--filled:hover { border-color: var(--md-error); }
.prog-slot--filled:hover .prog-remove { opacity: 1; }
.prog-slot--maj.prog-slot--filled { border-color: rgba(255,184,77,0.35); background: rgba(255,184,77,0.07); }
.prog-slot--dim.prog-slot--filled { border-color: rgba(242,184,181,0.35); background: rgba(242,184,181,0.06); }
.prog-roman { font-size: 10px; color: var(--md-outline); font-weight: 500; line-height: 1; }
.prog-name  { font-weight: 700; font-size: 14px; line-height: 1.1; }
.prog-slot--maj .prog-name { color: var(--color-maj); }
.prog-slot--min .prog-name { color: var(--md-on-surface-variant); }
.prog-slot--dim .prog-name { color: var(--md-error); }
.prog-remove {
  position: absolute; top: -8px; right: -8px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--md-error-container);
  color: var(--md-on-error-container);
  border: none; cursor: pointer;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s;
}
.progression-hint { font-size: 12px; color: var(--md-outline); font-style: italic; margin-top: 12px; }

.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
  z-index: 100;
}
.modal-overlay[hidden] { display: none; }
.modal {
  background: var(--md-surf-3);
  border-radius: var(--shape-xl);
  padding: 24px 28px 28px;
  min-width: 240px;
  text-align: center;
  position: relative;
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 8px 48px rgba(0,0,0,0.55);
  animation: modal-in 0.22s cubic-bezier(0.2,0,0,1);
}
@keyframes modal-in { from { opacity:0; transform:scale(0.88); } to { opacity:1; transform:scale(1); } }
.modal-close {
  position: absolute; top: 10px; right: 12px;
  background: transparent; border: none;
  color: var(--md-on-surface-variant);
  font-size: 22px; cursor: pointer;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  transition: background 0.15s, color 0.15s;
}
.modal-close:hover { background: rgba(255,255,255,0.08); color: var(--md-on-surface); }
.modal-title { font-size: 36px; font-weight: 700; color: var(--md-primary); margin-bottom: 4px; letter-spacing: -0.5px; }
.modal-subtitle { font-size: 11px; font-weight: 500; color: var(--md-outline); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 20px; }
.diagram-container { display: flex; justify-content: center; margin: 0 auto 2px; }
.diagram-lefty-note { font-size: 11px; color: var(--md-outline); font-style: italic; margin-top: 10px; }
.fret-line        { stroke: rgba(255,255,255,0.12); stroke-width: 1; }
.fret-line--nut   { stroke: var(--md-on-surface-variant); stroke-width: 3; }
.string-line      { stroke: rgba(255,255,255,0.14); stroke-width: 1; }
.fret-dot         { fill: var(--md-primary); }
.dot-open         { fill: none; stroke: var(--md-on-surface-variant); stroke-width: 1.5; }
.dot-mute-line    { stroke: var(--md-outline); stroke-width: 1.5; stroke-linecap: round; }
.barre-bar        { stroke: var(--md-primary); stroke-width: 10; stroke-linecap: round; opacity: 0.8; }
.fret-number      { fill: var(--md-outline); font-size: 9px; font-family: var(--font); }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <h1>Circle of Fifths</h1>
      <span class="header-key" id="header-key">select a key</span>
    </div>
  </header>

  <main class="layout">
    <section class="panel panel--circle">
      <svg id="circle-svg" viewBox="-200 -200 400 400" width="400" height="400" aria-label="Circle of Fifths"></svg>
    </section>
    <div class="panel-stack">
      <section class="panel panel--chords">
        <h2 class="panel-title">Diatonic Chords <span id="key-label"></span></h2>
        <div class="chord-grid" id="chord-grid">
          <p class="placeholder">Click a key on the circle to see its chords.</p>
        </div>
      </section>
      <section class="panel panel--modes">
        <h2 class="panel-title">Mode Explorer</h2>
        <div class="mode-list" id="mode-list">
          <p class="placeholder">Select a key to explore its modes.</p>
        </div>
      </section>
      <section class="panel panel--progression">
        <div class="progression-header">
          <h2 class="panel-title">Progression Builder</h2>
          <div class="progression-actions">
            <button class="btn btn--ghost" id="btn-copy">Copy</button>
            <button class="btn btn--danger" id="btn-clear">Clear</button>
          </div>
        </div>
        <div class="progression-slots" id="progression-slots"></div>
        <p class="progression-hint" id="progression-hint">Click any chord above to add it here.</p>
      </section>
    </div>
  </main>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal-chord" role="dialog" aria-modal="true">
      <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
      <h3 class="modal-title" id="modal-title"></h3>
      <p class="modal-subtitle" id="modal-subtitle"></p>
      <div class="diagram-container">
        <svg id="diagram-svg" viewBox="0 0 130 170" width="130" height="170"></svg>
      </div>
      <p class="diagram-lefty-note">Left-handed &middot; low E on right</p>
    </div>
  </div>

  <script>var AppState={currentKey:null,currentKeyIndex:null,currentChords:[]};</script>

  <script>
/* theory.js */
var CIRCLE=['C','G','D','A','E','B','F#','Db','Ab','Eb','Bb','F'];
var REL_MINORS=['Am','Em','Bm','F#m','C#m','G#m','D#m','Bbm','Fm','Cm','Gm','Dm'];
var CHROMATIC=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
var FLAT_CHROMATIC=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
var FLAT_KEYS=['F','Bb','Eb','Ab','Db','Gb'];
var MAJOR_INTERVALS=[0,2,4,5,7,9,11];
var QUALITIES=['maj','min','min','maj','maj','min','dim'];
var ROMANS=['I','ii','iii','IV','V','vi','vii\u00b0'];
var MODE_NAMES=['Ionian','Dorian','Phrygian','Lydian','Mixolydian','Aeolian','Locrian'];
var MODE_COLORS=['#f59e0b','#3b82f6','#ef4444','#a78bfa','#f97316','#6b7280','#1f2937'];
var MODE_FEEL={
  'Ionian':'Bright, happy, resolved. The home base of Western music. Every major key song lives here.',
  'Dorian':'Minor with a raised 6th. Soulful, funky, sophisticated. Santana, Miles Davis. Use over ii chord.',
  'Phrygian':'Minor with a \u266d2nd. Dark, exotic, Spanish/metal. Heavy and mysterious. Djent and flamenco territory.',
  'Lydian':'Major with a \u266f4th. Dreamy, floating, ethereal. Joe Satriani lives here. Perfect for ambient passages.',
  'Mixolydian':"Major with a \u266d7th. Bluesy rock, dominant energy. Classic rock's home. Stairway to Heaven verse.",
  'Aeolian':'Natural minor. Sad, emotional, introspective. Most expressive for dark moods. Most rock ballads.',
  'Locrian':'Diminished root. Unstable, dissonant, barely resolved. Use sparingly for maximum tension and drama.'
};
function normalizeKey(k){var m={'Db':'C#','Eb':'D#','Fb':'E','Gb':'F#','Ab':'G#','Bb':'A#','Cb':'B'};return m[k]!==undefined?m[k]:k;}
function noteNameForKey(i,k){return FLAT_KEYS.indexOf(k)!==-1?FLAT_CHROMATIC[i]:CHROMATIC[i];}
function getDiatonicChords(key){
  var n=normalizeKey(key),ri=CHROMATIC.indexOf(n);if(ri===-1)return[];
  return MAJOR_INTERVALS.map(function(iv,d){
    var ni=(ri+iv)%12,rn=noteNameForKey(ni,key),q=QUALITIES[d];
    var cn=q==='min'?rn+'m':q==='dim'?rn+'\u00b0':rn;
    var vk=q==='dim'?rn+'dim':cn;
    return{degree:d+1,roman:ROMANS[d],chordName:cn,rootNote:rn,quality:q,modeIndex:d,
           modeName:MODE_NAMES[d],modeDescription:MODE_FEEL[MODE_NAMES[d]],modeColor:MODE_COLORS[d],voicingKey:vk};
  });
}
function getNeighborIndices(i){return{fifth:(i+1)%12,fourth:(i+11)%12};}
  </script>

  <script>
/* voicings.js */
var VOICINGS={
  'C':{frets:[-1,3,2,0,1,0],baseFret:1},'G':{frets:[3,2,0,0,0,3],baseFret:1},
  'D':{frets:[-1,-1,0,2,3,2],baseFret:1},'A':{frets:[-1,0,2,2,2,0],baseFret:1},
  'E':{frets:[0,2,2,1,0,0],baseFret:1},'F':{frets:[1,3,3,2,1,1],baseFret:1},
  'B':{frets:[-1,2,4,4,4,2],baseFret:2},'F#':{frets:[2,4,4,3,2,2],baseFret:2},
  'Gb':{frets:[2,4,4,3,2,2],baseFret:2},'Db':{frets:[-1,4,6,6,6,4],baseFret:4},
  'Ab':{frets:[4,6,6,5,4,4],baseFret:4},'Eb':{frets:[-1,6,8,8,8,6],baseFret:6},
  'Bb':{frets:[-1,1,3,3,3,1],baseFret:1},'Am':{frets:[-1,0,2,2,1,0],baseFret:1},
  'Em':{frets:[0,2,2,0,0,0],baseFret:1},'Dm':{frets:[-1,-1,0,2,3,1],baseFret:1},
  'Fm':{frets:[1,3,3,1,1,1],baseFret:1},'Bm':{frets:[-1,2,4,4,3,2],baseFret:2},
  'F#m':{frets:[2,4,4,2,2,2],baseFret:2},'Gbm':{frets:[2,4,4,2,2,2],baseFret:2},
  'C#m':{frets:[-1,4,6,6,5,4],baseFret:4},'Dbm':{frets:[-1,4,6,6,5,4],baseFret:4},
  'G#m':{frets:[4,6,6,4,4,4],baseFret:4},'Abm':{frets:[4,6,6,4,4,4],baseFret:4},
  'D#m':{frets:[-1,6,8,8,7,6],baseFret:6},'Ebm':{frets:[-1,6,8,8,7,6],baseFret:6},
  'Bbm':{frets:[-1,1,3,3,2,1],baseFret:1},'Cm':{frets:[-1,3,5,5,4,3],baseFret:3},
  'Gm':{frets:[3,5,5,3,3,3],baseFret:3},
  'Bdim':{frets:[-1,2,3,4,3,-1],baseFret:1},'F#dim':{frets:[2,3,4,2,-1,-1],baseFret:2},
  'C#dim':{frets:[-1,4,5,3,5,-1],baseFret:3},'G#dim':{frets:[-1,0,1,2,1,-1],baseFret:1},
  'D#dim':{frets:[-1,1,2,3,2,-1],baseFret:1},'A#dim':{frets:[-1,1,2,0,2,-1],baseFret:1},
  'Edim':{frets:[0,1,2,0,-1,-1],baseFret:1},'Cdim':{frets:[-1,3,4,5,4,-1],baseFret:3},
  'Gdim':{frets:[-1,-1,5,6,5,-1],baseFret:5},'Ddim':{frets:[-1,-1,0,1,0,-1],baseFret:1},
  'Adim':{frets:[-1,0,1,2,1,-1],baseFret:1},'Fdim':{frets:[1,2,3,1,-1,-1],baseFret:1},
  'Gbdim':{frets:[2,3,4,2,-1,-1],baseFret:2},'Dbdim':{frets:[-1,4,5,3,5,-1],baseFret:3},
  'Abdim':{frets:[-1,0,1,2,1,-1],baseFret:1},'Ebdim':{frets:[-1,1,2,3,2,-1],baseFret:1},
  'Bbdim':{frets:[-1,1,2,0,2,-1],baseFret:1}
};
function getVoicing(k){if(VOICINGS[k])return VOICINGS[k];var c=k.replace('\u00b0','dim');if(VOICINGS[c])return VOICINGS[c];return{frets:[-1,-1,-1,-1,-1,-1],baseFret:1};}
function mirrorForLefty(f){return f.slice().reverse();}
  </script>

  <script>
/* circle.js */
var CR_OUT=175,CR_MID=118,CR_IN=66,CR_LM=147,CR_LN=92;
function d2r(d){return d*Math.PI/180;}
function p2xy(r,a){var rd=d2r(a);return{x:r*Math.cos(rd),y:r*Math.sin(rd)};}
function arcPath(ir,or,s,e){
  var a=p2xy(or,s),b=p2xy(or,e),c=p2xy(ir,e),dd=p2xy(ir,s);
  var path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',['M',a.x,a.y,'A',or,or,0,0,1,b.x,b.y,'L',c.x,c.y,'A',ir,ir,0,0,0,dd.x,dd.y,'Z'].join(' '));
  return path;
}
function arcLabel(r,a,t,cls){
  var p=p2xy(r,a),el=document.createElementNS('http://www.w3.org/2000/svg','text');
  el.setAttribute('x',p.x);el.setAttribute('y',p.y);el.setAttribute('class',cls);el.textContent=t;return el;
}
function initCircle(svg){
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  var hub=document.createElementNS('http://www.w3.org/2000/svg','circle');
  hub.setAttribute('r',CR_IN);hub.setAttribute('cx',0);hub.setAttribute('cy',0);hub.setAttribute('class','circle-center');svg.appendChild(hub);
  var ht=document.createElementNS('http://www.w3.org/2000/svg','text');
  ht.setAttribute('x',0);ht.setAttribute('y',0);ht.setAttribute('class','circle-center-text');ht.textContent='5ths';svg.appendChild(ht);
  for(var i=0;i<12;i++){
    var mid=i*30-90,s=mid-15,e=mid+15;
    var ma=arcPath(CR_MID,CR_OUT,s,e);ma.setAttribute('class','arc-major');ma.dataset.index=i;ma.dataset.key=CIRCLE[i];ma.dataset.ringType='major';svg.appendChild(ma);
    var ml=arcLabel(CR_LM,mid,CIRCLE[i],'arc-label-major');ml.dataset.index=i;ml.dataset.ringType='major';svg.appendChild(ml);
    var na=arcPath(CR_IN,CR_MID,s,e);na.setAttribute('class','arc-minor');na.dataset.index=i;na.dataset.key=REL_MINORS[i];na.dataset.ringType='minor';svg.appendChild(na);
    var nl=arcLabel(CR_LN,mid,REL_MINORS[i],'arc-label-minor');nl.dataset.index=i;nl.dataset.ringType='minor';svg.appendChild(nl);
  }
  svg.addEventListener('click',function(ev){var t=ev.target,ix=t.dataset&&t.dataset.index;if(ix===undefined||ix===null||ix==='')return;selectKey(svg,parseInt(ix,10));});
}
function selectKey(svg,ci){
  var nb=getNeighborIndices(ci);
  svg.querySelectorAll('.arc-major,.arc-label-major').forEach(function(el){el.classList.remove('selected','neighbor-fifth','neighbor-fourth');});
  svg.querySelectorAll('.arc-minor,.arc-label-minor').forEach(function(el){el.classList.remove('selected','neighbor-fifth','neighbor-fourth');});
  svg.querySelectorAll('[data-index="'+ci+'"]').forEach(function(el){el.classList.add('selected');});
  svg.querySelectorAll('[data-index="'+nb.fifth+'"].arc-major,[data-index="'+nb.fifth+'"].arc-label-major').forEach(function(el){el.classList.add('neighbor-fifth');});
  svg.querySelectorAll('[data-index="'+nb.fourth+'"].arc-major,[data-index="'+nb.fourth+'"].arc-label-major').forEach(function(el){el.classList.add('neighbor-fourth');});
  svg.dispatchEvent(new CustomEvent('keySelected',{detail:{circleIndex:ci,key:CIRCLE[ci]},bubbles:true}));
}
  </script>

  <script>
/* chords.js */
function renderChordGrid(chords,keyName){
  var grid=document.getElementById('chord-grid');
  document.getElementById('key-label').textContent='\u2014 '+keyName+' Major';
  grid.innerHTML='';
  chords.forEach(function(ch,idx){
    var card=document.createElement('div');
    card.className='chord-card chord-card--'+ch.quality;
    card.dataset.chordIndex=idx;
    card.title=ch.modeName+': '+ch.modeDescription;
    card.innerHTML='<span class="chord-roman">'+ch.roman+'</span>'+
      '<span class="chord-name">'+ch.chordName+'</span>'+
      '<span class="chord-mode-name">'+ch.modeName+'</span>'+
      '<button class="btn-diagram" data-voicing-key="'+ch.voicingKey+'" data-chord-name="'+ch.chordName+'" data-mode-name="'+ch.modeName+'" data-quality="'+ch.quality+'">Diagram</button>';
    grid.appendChild(card);
  });
}
function renderModeList(chords){
  var list=document.getElementById('mode-list');list.innerHTML='';
  chords.forEach(function(ch){
    var row=document.createElement('div');row.className='mode-row';row.style.setProperty('--mode-color',ch.modeColor);
    row.innerHTML='<div class="mode-meta"><span class="mode-chord-name">'+ch.chordName+'</span><span class="mode-roman">'+ch.roman+'</span></div>'+
      '<div class="mode-info"><span class="mode-name">'+ch.modeName+'</span><p class="mode-desc">'+ch.modeDescription+'</p></div>';
    list.appendChild(row);
  });
}
  </script>

  <script>
/* progression.js */
var MAX_SLOTS=8,_progression=[];
function addToProgression(ch){if(_progression.length>=MAX_SLOTS)return;_progression.push(ch);renderProgression();updateProgressionHint();}
function removeFromProgression(i){_progression.splice(i,1);renderProgression();updateProgressionHint();}
function clearProgression(){_progression=[];renderProgression();updateProgressionHint();}
function getProgressionString(){return _progression.map(function(c){return c.chordName;}).join(' - ');}
function renderProgression(){
  var c=document.getElementById('progression-slots');c.innerHTML='';
  for(var i=0;i<MAX_SLOTS;i++){
    var slot=document.createElement('div');
    if(_progression[i]){
      var ch=_progression[i];
      slot.className='prog-slot prog-slot--filled prog-slot--'+ch.quality;slot.dataset.slotIndex=i;
      var rb=document.createElement('button');rb.className='prog-remove';rb.dataset.index=i;rb.title='Remove';rb.innerHTML='&times;';
      var re=document.createElement('span');re.className='prog-roman';re.textContent=ch.roman;
      var ne=document.createElement('span');ne.className='prog-name';ne.textContent=ch.chordName;
      slot.appendChild(rb);slot.appendChild(re);slot.appendChild(ne);
    }else{slot.className='prog-slot prog-slot--empty';}
    c.appendChild(slot);
  }
  c.querySelectorAll('.prog-remove').forEach(function(btn){
    btn.addEventListener('click',function(ev){ev.stopPropagation();removeFromProgression(parseInt(btn.dataset.index,10));});
  });
}
function updateProgressionHint(){var h=document.getElementById('progression-hint');if(h)h.style.display=_progression.length===0?'block':'none';}
  </script>

  <script>
/* app.js */
document.addEventListener('DOMContentLoaded',function(){
  var svg=document.getElementById('circle-svg');
  initCircle(svg);renderProgression();updateProgressionHint();

  svg.addEventListener('keySelected',function(e){
    var key=e.detail.key;
    AppState.currentKey=key;AppState.currentKeyIndex=e.detail.circleIndex;AppState.currentChords=getDiatonicChords(key);
    document.getElementById('header-key').textContent=key+' Major';
    renderChordGrid(AppState.currentChords,key);renderModeList(AppState.currentChords);
  });

  document.getElementById('chord-grid').addEventListener('click',function(e){
    if(e.target.matches('.btn-diagram')||e.target.closest('.btn-diagram'))return;
    var card=e.target.closest('.chord-card');if(!card)return;
    var chord=AppState.currentChords[parseInt(card.dataset.chordIndex,10)];if(!chord)return;
    addToProgression(chord);card.classList.add('active');setTimeout(function(){card.classList.remove('active');},300);
  });

  document.getElementById('chord-grid').addEventListener('click',function(e){
    var btn=e.target.closest('.btn-diagram');if(!btn)return;e.stopPropagation();
    openDiagramModal(btn.dataset.voicingKey,btn.dataset.chordName,btn.dataset.modeName);
  });

  document.getElementById('btn-clear').addEventListener('click',clearProgression);
  document.getElementById('btn-copy').addEventListener('click',function(){
    var str=getProgressionString();if(!str)return;
    if(navigator.clipboard){navigator.clipboard.writeText(str).then(function(){flashBtn(document.getElementById('btn-copy'),'Copied!');});}
    else{var ta=document.createElement('textarea');ta.value=str;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);flashBtn(document.getElementById('btn-copy'),'Copied!');}
  });
  document.getElementById('modal-close').addEventListener('click',closeDiagramModal);
  document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===e.currentTarget)closeDiagramModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDiagramModal();});
});

function openDiagramModal(vk,cn,mn){
  document.getElementById('modal-title').textContent=cn;
  document.getElementById('modal-subtitle').textContent=mn+' mode';
  renderChordDiagram(vk,document.getElementById('diagram-svg'));
  document.getElementById('modal-overlay').removeAttribute('hidden');
}
function closeDiagramModal(){document.getElementById('modal-overlay').setAttribute('hidden','');}
function flashBtn(btn,text){var o=btn.textContent;btn.textContent=text;setTimeout(function(){btn.textContent=o;},1500);}

var D_SX=22,D_SY=36,D_SG=17,D_FG=22,D_NF=4,D_DR=7,D_OR=6;
function renderChordDiagram(vk,svgEl){
  while(svgEl.firstChild)svgEl.removeChild(svgEl.firstChild);
  var vo=getVoicing(vk),fr=mirrorForLefty(vo.frets),bf=vo.baseFret,n=6;
  function el(tag,attrs){var e=document.createElementNS('http://www.w3.org/2000/svg',tag);Object.keys(attrs).forEach(function(k){e.setAttribute(k,attrs[k]);});return e;}
  for(var f=0;f<=D_NF;f++){var y=D_SY+f*D_FG;svgEl.appendChild(el('line',{x1:D_SX,y1:y,x2:D_SX+(n-1)*D_SG,y2:y,'class':(f===0&&bf===1)?'fret-line fret-line--nut':'fret-line'}));}
  for(var s=0;s<n;s++){var x=D_SX+s*D_SG;svgEl.appendChild(el('line',{x1:x,y1:D_SY,x2:x,y2:D_SY+D_NF*D_FG,'class':'string-line'}));}
  if(bf>1){var fl=el('text',{x:D_SX-5,y:D_SY+D_FG*0.5+4,'class':'fret-number','text-anchor':'end'});fl.textContent=bf+'fr';svgEl.appendChild(fl);}
  for(var s2=0;s2<n;s2++){var sx=D_SX+s2*D_SG,my=D_SY-14,h=5;
    if(fr[s2]===-1){svgEl.appendChild(el('line',{x1:sx-h,y1:my-h,x2:sx+h,y2:my+h,'class':'dot-mute-line'}));svgEl.appendChild(el('line',{x1:sx+h,y1:my-h,x2:sx-h,y2:my+h,'class':'dot-mute-line'}));}
    else if(fr[s2]===0){svgEl.appendChild(el('circle',{cx:sx,cy:my,r:D_OR,'class':'dot-open'}));}
  }
  var pf=fr.filter(function(v){return v>0;}),mf=pf.length?Math.min.apply(null,pf):0;
  var bs=[];fr.forEach(function(v,i){if(v===mf&&mf>0)bs.push(i);});
  if(bs.length>=3){var rf=mf-(bf-1),by=D_SY+(rf-0.5)*D_FG;svgEl.appendChild(el('line',{x1:D_SX+bs[0]*D_SG,y1:by,x2:D_SX+bs[bs.length-1]*D_SG,y2:by,'class':'barre-bar'}));}
  for(var s3=0;s3<n;s3++){var fn=fr[s3];if(fn<=0)continue;var rn=fn-(bf-1);if(rn<1||rn>D_NF)continue;if(!(bs.length>=3&&fn===mf))svgEl.appendChild(el('circle',{cx:D_SX+s3*D_SG,cy:D_SY+(rn-0.5)*D_FG,r:D_DR,'class':'fret-dot'}));}
  if(bs.length>=3)for(var s4=0;s4<n;s4++){var fv=fr[s4];if(fv<=0||fv===mf)continue;var rv=fv-(bf-1);if(rv<1||rv>D_NF)continue;svgEl.appendChild(el('circle',{cx:D_SX+s4*D_SG,cy:D_SY+(rv-0.5)*D_FG,r:D_DR,'class':'fret-dot'}));}
}
  </script>
